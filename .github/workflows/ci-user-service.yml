name: CI/CD — User Service

on:
  push:
    branches:
      - develop
      - main
      - feature/ci-user-service
  pull_request:
    branches:
      - develop
      - main
      - feature/ci-user-service
permissions:
  contents: write

jobs:
  # ─── SAST ───
  sast:
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sast.yml@v2.0.0
    with:
      service-path: .
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_URL: ${{ secrets.SONAR_URL }}

  # ─── SCA (Snyk) ───
  sca:
    needs: [sast]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_sca.yml@v2.0.0
    with:
      service-name: user-service
      service-path: .
      runtime: node
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ─── Notify: Snyk Criticals ───
  notify-snyk:
    needs: [sca]
    if: needs.sca.outputs.critical-found == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Snyk: Critical Vulnerabilities in user-service"
      body: "Critical/High vulnerabilities found in user-service dependencies."
      service-name: user-service
      artifact-name: snyk-report-user-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── Temp Docker Build + Trivy Scan ───
  build:
    needs: [sast, sca]
    if: github.event_name == 'pull_request'
    uses: fitforge101/fitforge-shared/.github/workflows/_docker-build.yml@v2.0.0
    with:
      service-name: user-service
      service-path: .

  # ─── Notify: Trivy Criticals ───
  notify-trivy:
    needs: [build]
    if: needs.build.outputs.trivy-critical == 'true'
    uses: fitforge101/fitforge-shared/.github/workflows/_notify.yml@v2.0.0
    with:
      subject: "🚨 Trivy: Critical Vulnerabilities in user-service"
      body: "CRITICAL vulnerabilities found in user-service Docker image."
      service-name: user-service
      artifact-name: trivy-user-service
    secrets:
      BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

  # ─── 🚀 NEW: Publish to AWS ECR using OIDC ───
  publish-ecr:
    name: Publish to AWS ECR (OIDC)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::427553887573:role/github-actions-ecr-user-service
          aws-region: ap-south-1

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | \
          docker login --username AWS --password-stdin 427553887573.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t 427553887573.dkr.ecr.ap-south-1.amazonaws.com/user-service:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push 427553887573.dkr.ecr.ap-south-1.amazonaws.com/user-service:${{ github.sha }}
      
      - name: Verify ECR Images
        run: aws ecr describe-images --repository-name user-service

